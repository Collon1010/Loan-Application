<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Loan Application</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#eef3ff;
font-family:Arial,sans-serif;
}

.box{
max-width:650px;
margin:40px auto;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,.15);
}

.title{
text-align:center;
color:#0d6efd;
margin-bottom:25px;
}

.btn-loan{
width:100%;
padding:15px;
background:#0d6efd;
color:white;
border:none;
border-radius:10px;
font-size:18px;
}

.btn-loan:hover{
background:#084dbf;
}

</style>

</head>

<body>

<div class="box">

<h2 class="title">QuickCash Loan Application</h2>

<form action="/status" method="POST">

<div class="mb-3">
<label>Full Name</label>
<input type="text" class="form-control" required>
</div>

<div class="mb-3">
<label>National ID</label>
<input type="text" class="form-control" required>
</div>

<div class="mb-3">
<label>Phone Number</label>
<input type="text" class="form-control" required>
</div>

<div class="mb-3">
<label>Email Address</label>
<input type="email" class="form-control" required>
</div>

<div class="mb-3">
<label>Monthly Income (KSh)</label>
<input type="number" class="form-control" required>
</div>

<div class="mb-3">
<label>Loan Amount Required</label>
<select class="form-control">

<option>KSh 5,000</option>
<option>KSh 10,000</option>
<option>KSh 20,000</option>
<option>KSh 50,000</option>
<option>KSh 100,000</option>
<option>KSh 250,000</option>
<option>KSh 500,000</option>

</select>

</div>

<div class="mb-3">
<label>Purpose of Loan</label>

<textarea class="form-control" rows="4"></textarea>

</div>

<button class="btn-loan">
Submit Application
</button>

</form>

</div>

</body>
    </html>
