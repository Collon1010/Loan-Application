<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Application</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Loan Application</h1>
</header>

<section>
    <form>
        <input type="text" placeholder="Full Name" required><br><br>

        <input type="tel" placeholder="Phone Number" required><br><br>

        <input type="email" placeholder="Email Address" required><br><br>

        <input type="number" placeholder="Loan Amount" required><br><br>

        <textarea placeholder="Purpose of the Loan"></textarea><br><br>

        <button type="button">Continue to Payment</button>
    </form>
</section>

</body>
          </html>
