<form action="/status" method="POST">

<div class="mb-3">
<label>Full Name</label>
<input type="text" name="fullname" class="form-control" required>
</div>

<div class="mb-3">
<label>National ID</label>
<input type="text" name="nationalid" class="form-control" required>
</div>

<div class="mb-3">
<label>Phone Number</label>
<input type="text" name="phone" class="form-control" required>
</div>

<div class="mb-3">
<label>Email Address</label>
<input type="email" name="email" class="form-control" required>
</div>

<div class="mb-3">
<label>Monthly Income (KSh)</label>
<input type="number" name="income" class="form-control" required>
</div>

<div class="mb-3">
<label>Loan Amount Required</label>
<select name="loanamount" class="form-control">

<option>KSh 5,000</option>
<option>KSh 10,000</option>
<option>KSh 20,000</option>
<option>KSh 50,000</option>
<option>KSh 100,000</option>
<option>KSh 250,000</option>
<option>KSh 500,000</option>

</select>

</div>

<div class="mb-3">
<label>Purpose of Loan</label>

<textarea name="purpose" class="form-control" rows="4"></textarea>

</div>

<button class="btn-loan">
Submit Application
</button>

</form>
