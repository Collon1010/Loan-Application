<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Application Status</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

    <style>
        body {
            background: #eef3ff;
            font-family: Arial, sans-serif;
        }

        .box {
            max-width: 650px;
            margin: 60px auto;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, .15);
            text-align: center;
        }

        .success {
            font-size: 70px;
            color: #28a745;
        }

        .btn-pay {
            background: #0d6efd;
            color: white;
            padding: 15px 35px;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
        }

        .btn-pay:hover {
            background: #084dbf;
        }

        .fee-amount {
            font-weight: 700;
            color: #0d6efd;
            font-size: 1.4rem;
        }
    </style>
</head>

<body>

    <div class="box">

        <div class="success">✓</div>

        <h2>Congratulations – You Qualify!</h2>

        <p>
            Your application has been received and you qualify for the loan.
        </p>

        <div class="alert alert-info">
            <strong>Only <span class="fee-amount">100 KSH</span></strong> is required
            as the processing fee to release your loan amount.
        </div>

        <button class="btn-pay">
            Continue to Payment
        </button>

    </div>

</body>
  </html>
